name: Automation Pipelines

# Phase 9b (2026-05-17): `ingest-tools` and `refresh-tools` jobs moved
# to .github/workflows/freshness-batch.yml — those now run the batch
# scripts directly inside GH Actions runners (200-tool batches) rather
# than curling the Vercel route (capped at ~10 tools by function
# timeout). This file keeps the lightweight curl-to-Vercel jobs that
# fit comfortably in the Vercel function budget.

on:
  schedule:
    # Refresh FAQs — every 2 days at 6:00 AM UTC
    - cron: '0 6 */2 * *'
    # Generate editorials — Mondays at 5:00 AM UTC
    - cron: '0 5 * * 1'
    # Discover tutorials — Tuesdays and Fridays at 7:00 AM UTC
    - cron: '0 7 * * 2,5'
    # Calculate viability scores — Wednesdays at 3:00 AM UTC
    - cron: '0 3 * * 3'
    # Submit all URLs to IndexNow — Sundays at 1:00 AM UTC
    - cron: '0 1 * * 0'
    # Submit recently-seeded URLs to IndexNow — daily at 1:30 AM UTC
    - cron: '30 1 * * *'
  workflow_dispatch:
    inputs:
      pipeline:
        description: 'Pipeline to run'
        required: true
        type: choice
        options:
          - refresh-faqs
          - generate-editorials
          - discover-tutorials
          - calculate-viability
          - submit-indexnow
          - submit-indexnow-recent
          - all

env:
  BASE_URL: https://rightaichoice.com

jobs:
  refresh-faqs:
    if: >-
      github.event.schedule == '0 6 */2 * *' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.pipeline == 'refresh-faqs' || github.event.inputs.pipeline == 'all'))
    runs-on: ubuntu-latest
    steps:
      - name: Refresh FAQs from social sources
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          result=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X POST \
            "$BASE_URL/api/cron/refresh-faqs" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json")
          body=$(echo "$result" | sed '$d')
          code=$(echo "$result" | grep "HTTP_CODE:" | cut -d: -f2)
          echo "Response code: $code"
          echo "Response body: $body"
          if [ "$code" != "200" ]; then exit 1; fi

  generate-editorials:
    if: >-
      github.event.schedule == '0 5 * * 1' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.pipeline == 'generate-editorials' || github.event.inputs.pipeline == 'all'))
    runs-on: ubuntu-latest
    steps:
      - name: Generate editorial content
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          result=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X POST \
            "$BASE_URL/api/cron/generate-editorials" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json")
          body=$(echo "$result" | sed '$d')
          code=$(echo "$result" | grep "HTTP_CODE:" | cut -d: -f2)
          echo "Response code: $code"
          echo "Response body: $body"
          if [ "$code" != "200" ]; then exit 1; fi

  discover-tutorials:
    if: >-
      github.event.schedule == '0 7 * * 2,5' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.pipeline == 'discover-tutorials' || github.event.inputs.pipeline == 'all'))
    runs-on: ubuntu-latest
    steps:
      - name: Discover YouTube tutorials
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          result=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X POST \
            "$BASE_URL/api/cron/discover-tutorials" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json")
          body=$(echo "$result" | sed '$d')
          code=$(echo "$result" | grep "HTTP_CODE:" | cut -d: -f2)
          echo "Response code: $code"
          echo "Response body: $body"
          if [ "$code" != "200" ]; then exit 1; fi

  submit-indexnow:
    if: >-
      github.event.schedule == '0 1 * * 0' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.pipeline == 'submit-indexnow' || github.event.inputs.pipeline == 'all'))
    runs-on: ubuntu-latest
    steps:
      - name: Submit all URLs to IndexNow
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          result=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X POST \
            "$BASE_URL/api/indexnow" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json")
          body=$(echo "$result" | sed '$d')
          code=$(echo "$result" | grep "HTTP_CODE:" | cut -d: -f2)
          echo "Response code: $code"
          echo "Response body: $body"
          if [ "$code" != "200" ]; then exit 1; fi

  submit-indexnow-recent:
    if: >-
      github.event.schedule == '30 1 * * *' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.pipeline == 'submit-indexnow-recent' || github.event.inputs.pipeline == 'all'))
    runs-on: ubuntu-latest
    steps:
      - name: Submit recently-seeded URLs to IndexNow
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          result=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X POST \
            "$BASE_URL/api/cron/indexnow-recent" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json")
          body=$(echo "$result" | sed '$d')
          code=$(echo "$result" | grep "HTTP_CODE:" | cut -d: -f2)
          echo "Response code: $code"
          echo "Response body: $body"
          if [ "$code" != "200" ]; then exit 1; fi

  calculate-viability:
    if: >-
      github.event.schedule == '0 3 * * 3' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.pipeline == 'calculate-viability' || github.event.inputs.pipeline == 'all'))
    runs-on: ubuntu-latest
    steps:
      - name: Calculate viability scores
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          result=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X POST \
            "$BASE_URL/api/cron/calculate-viability" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json")
          body=$(echo "$result" | sed '$d')
          code=$(echo "$result" | grep "HTTP_CODE:" | cut -d: -f2)
          echo "Response code: $code"
          echo "Response body: $body"
          if [ "$code" != "200" ]; then exit 1; fi
