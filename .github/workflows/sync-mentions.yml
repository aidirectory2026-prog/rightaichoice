name: Sync page_tool_mentions

# 1.1 freshness-cascade — rebuilds the page_tool_mentions bridge table.
#
# Two halves:
#   1. SQL function `sync_page_tool_mentions_db()` — db_join rows
#      (tool pages, category pages, compare pages). Run via Supabase RPC.
#   2. Code-config + blog scripts — code_config and blog_frontmatter rows
#      (best/role/stack pages + blog posts).
#
# Nightly schedule (01:15 UTC) keeps the mention->page linkage current so
# newly-ingested / mid-catalog tools surface in their page rollups instead
# of starving. Both code/blog scripts and the db_join RPC are rebuild-style
# (upsert on (page_path,tool_slug) + delete-stale), so re-running is safe
# and idempotent. workflow_dispatch is retained for manual force-fires.
#
# 01:15 UTC sits clear of the 02:00-05:00 freshness stack, the 00:30 viability
# Vercel cron, and the 01:00/01:30 IndexNow GH jobs.
#
# Required secrets:
#   NEXT_PUBLIC_SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY

on:
  schedule:
    # Rebuild page_tool_mentions nightly at 01:15 UTC
    - cron: '15 1 * * *'
  workflow_dispatch:
    inputs:
      include_db_join:
        description: 'Also run sync_page_tool_mentions_db() RPC (db_join rows)'
        required: false
        type: boolean
        default: true
      dry_run:
        description: 'Dry run (no writes)'
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: '20'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Sync code_config mentions (best / role / stack)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DRY: ${{ github.event.inputs.dry_run }}
        run: |
          if [ "$DRY" = "true" ]; then
            npx tsx scripts/sync-page-mentions-from-code.ts --dry-run
          else
            npx tsx scripts/sync-page-mentions-from-code.ts
          fi

      - name: Sync blog_frontmatter mentions
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DRY: ${{ github.event.inputs.dry_run }}
        run: |
          if [ "$DRY" = "true" ]; then
            npx tsx scripts/sync-page-mentions-from-blog.ts --dry-run
          else
            npx tsx scripts/sync-page-mentions-from-blog.ts
          fi

      - name: Sync db_join mentions (via SQL RPC)
        # On a scheduled run inputs are empty -> include db_join (the default)
        # and never dry-run. On manual dispatch, honor the chosen inputs.
        if: ${{ github.event_name == 'schedule' || (github.event.inputs.include_db_join == 'true' && github.event.inputs.dry_run != 'true') }}
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl -sS -X POST "$SUPABASE_URL/rest/v1/rpc/sync_page_tool_mentions_db" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -d '{}'
          echo  # newline after numeric response
