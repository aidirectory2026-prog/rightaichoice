name: Tracking Watchdog

# Weekly regression check on the analytics pipeline. Verifies page_viewed,
# tool_page_viewed, server-mirrored events, and signup-drift. Alerts via
# Resend when a check fails — catches silent breakage from refactors that
# strip tracking calls without updating /admin/insights.

on:
  schedule:
    # Mondays at 8:00 AM UTC — early enough to spot a Friday-night
    # deploy breaking tracking before the work-week dashboards matter.
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm ci
      - name: Verify event registry (9.A.2 — static, no secrets)
        # Fails the run if a dashboard depends on a never-firing event, or a
        # defined event is neither wired nor acknowledged in lib/analytics-registry.ts.
        run: npx tsx scripts/audit/verify-event-registry.ts
      - name: Run watchdog
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
        run: npx tsx scripts/audit/tracking-watchdog.ts
