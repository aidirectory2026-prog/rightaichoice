name: Freshness Batch Pipelines

# Phase 9b (2026-05-17): heavy freshness work moved from Vercel cron
# (bounded by 60s Hobby / 300s Pro function timeout) to GH Actions
# (6-hour job budget). Same code, same DeepSeek API, same DB writes —
# just lifted out of the serverless timeout box so we can refresh
# 200+ tools per nightly job instead of ~10 per Vercel fire.
#
# REQUIRED REPO SECRETS (Settings → Secrets and variables → Actions → New repository secret)
#   - NEXT_PUBLIC_SUPABASE_URL       (same value as Vercel env)
#   - SUPABASE_SERVICE_ROLE_KEY      (same value as Vercel env)
#   - DEEPSEEK_API_KEY               (same value as Vercel env)
#   - ANTHROPIC_API_KEY              (still used by curate gate inside ingest)
#   - APIFY_TOKEN                    (used by refresh-latest-updates)
#
# Manual trigger any job via the "Run workflow" button in the Actions
# tab — useful when you want to force-fire after operator intervention
# (vendor URL change, prompt tune, etc).

on:
  schedule:
    # Phase 10 S5 — 3-DAY freshness SLA. Tier-aware refresh runs TWICE daily
    # (02:00 + 14:00 UTC, 500 tools each): always the due daily-tier (top-150),
    # then stalest 'standard' fill → ~850 standard/day, long-tail cycle ≈2.2d.
    - cron: '0 2 * * *'
    - cron: '0 14 * * *'
    # Refresh "Latest from" data — 360 stalest tools daily 03:00 UTC.
    # Whole catalog (~2,000, cap 2,500) checked within 7 days; cheap
    # change-detector means only changed tools pay the DeepSeek cost.
    - cron: '0 3 * * *'
    # Ingest 50 trending new tools — daily 04:00 UTC
    - cron: '0 4 * * *'
    # Regenerate stale compare editorials — daily 05:00 UTC
    - cron: '0 5 * * *'
    # Backfill real logos for tools missing logo_url — daily 05:40 UTC.
    # Staggered AFTER the 02:00-05:00 freshness/ingest stack so freshly
    # ingested tools (04:00) get a logo the same night. Idempotent: the
    # script only ever fetches+verifies+rehosts for rows with null/empty
    # logo_url (runtime favicon fallback covers the rest), so re-running
    # never overwrites or churns existing logos.
    - cron: '40 5 * * *'
    # Phase 11 B2 — deep 22-field SOP, 300 stalest tools daily 06:00 UTC.
    # Whole catalog's every field refreshed within ~7 days (weekly cadence).
    # The lite refresh-tools job keeps the 9 core editorial fields ≤2-3 days;
    # this layer refreshes the 13 density fields (FAQs, workflow scenarios,
    # pricing-tier guides, migrations, hidden costs) on top.
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      pipeline:
        description: 'Which pipeline to fire'
        required: true
        type: choice
        options:
          - refresh-tools-batch
          - refresh-latest-updates
          - ingest-tools-batch
          - cascade-batch
          - backfill-logos
          - full-refresh
          - all
      batch_size:
        description: 'Override default batch size (optional, blank = pipeline default)'
        required: false
        type: string
        default: ''

env:
  NODE_VERSION: '20'

jobs:
  # ── Refresh tools — twice daily (02:00 + 14:00 UTC), 3-day freshness SLA ──
  refresh-tools:
    if: >-
      github.event.schedule == '0 2 * * *' ||
      github.event.schedule == '0 14 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.pipeline == 'refresh-tools-batch' || github.event.inputs.pipeline == 'all'))
    runs-on: ubuntu-latest
    timeout-minutes: 300
    # P2 (Cowork QA): this job and Retry Failed Tools both run
    # refresh-tools-batch.ts against the same stalest-first queue (no row
    # locking), so overlapping runs double-process tools = wasted DeepSeek spend
    # + last-writer-wins. Share one concurrency group across both workflows so
    # they never run simultaneously (a second run queues, doesn't cancel).
    concurrency:
      group: refresh-tools-batch
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: Refresh tools (DeepSeek)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size }}
        run: |
          if [ -n "$BATCH_SIZE" ]; then
            npx tsx scripts/refresh-tools-batch.ts --batch="$BATCH_SIZE"
          else
            npx tsx scripts/refresh-tools-batch.ts
          fi

  # ── Refresh "Latest from" data — 360 stalest tools nightly ─────────
  # Whole catalog checked within 7 days; change-detector skips DeepSeek
  # for unchanged tools (cheap signal fetch only). Override cohort size
  # with the batch_size dispatch input (mapped to DAILY_LIMIT).
  refresh-latest-updates:
    if: >-
      github.event.schedule == '0 3 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.pipeline == 'refresh-latest-updates' || github.event.inputs.pipeline == 'all'))
    runs-on: ubuntu-latest
    # 360 tools × cheap signal fetch (5-way concurrency) ≈ 20-50 min;
    # only changed tools add DeepSeek latency. 180-min budget is ample.
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: Refresh latest-updates
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          DAILY_LIMIT: ${{ github.event.inputs.batch_size }}
        run: npx tsx scripts/refresh-latest-updates.ts --apply

  # ── Ingest 50 trending new tools nightly ───────────────────────────
  ingest-tools:
    if: >-
      github.event.schedule == '0 4 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.pipeline == 'ingest-tools-batch' || github.event.inputs.pipeline == 'all'))
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: Ingest new tools (traction-gated)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Fable-5 review (2026-06-12) — the traction probe's Reddit signal
          # needs the OAuth app creds (tokenless endpoint 403s from CI IPs);
          # without these every candidate probes reddit=0 and the gate
          # rejects the whole batch.
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size }}
        run: |
          if [ -n "$BATCH_SIZE" ]; then
            npx tsx scripts/ingest-tools-batch.ts --batch="$BATCH_SIZE"
          else
            npx tsx scripts/ingest-tools-batch.ts
          fi

  # ── Regenerate stale compare editorials nightly ────────────────────
  cascade-editorials:
    if: >-
      github.event.schedule == '0 5 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.pipeline == 'cascade-batch' || github.event.inputs.pipeline == 'all'))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: Regenerate compare editorials
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size }}
        run: |
          if [ -n "$BATCH_SIZE" ]; then
            npx tsx scripts/refresh-compare-editorials-batch.ts --batch="$BATCH_SIZE"
          else
            npx tsx scripts/refresh-compare-editorials-batch.ts
          fi

  # ── Backfill real logos for tools missing logo_url — nightly 05:40 UTC ──
  # Heavy script (downloads+verifies+rehosts homepage icons via sharp), so it
  # lives in GH Actions rather than a Vercel route. Idempotent + "missing-only"
  # by construction: --apply selects ONLY published tools with null/empty
  # logo_url and a website_url, and the DB write is itself guarded on
  # logo_url.is.null,logo_url.eq.'' — existing logos are never touched.
  backfill-logos:
    if: >-
      github.event.schedule == '40 5 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.pipeline == 'backfill-logos' || github.event.inputs.pipeline == 'all'))
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: Backfill missing logos (download + verify + rehost)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size }}
        run: |
          if [ -n "$BATCH_SIZE" ]; then
            npx tsx scripts/backfill-logos.ts --apply --limit="$BATCH_SIZE"
          else
            npx tsx scripts/backfill-logos.ts --apply
          fi

  # ── Deep 22-field refresh — 300 stalest tools daily 06:00 UTC (Phase 11 B2) ──
  # The lite refresh-tools job keeps the 9 core editorial fields ≤2-3 days; this
  # runs the full Phase 4 SOP (all 22 fields, incl. FAQs, workflow scenarios,
  # pricing-tier guides, migrations, hidden costs) on a stalest-by-last_full_refresh_at
  # cohort → whole catalog cycles in ~7 days. DeepSeek-only (built-in scraper, no
  # Apify); cost lands in pipeline_runs (pipeline_key=refresh-tool-data-full).
  full-refresh:
    if: >-
      github.event.schedule == '0 6 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.pipeline == 'full-refresh' || github.event.inputs.pipeline == 'all'))
    runs-on: ubuntu-latest
    timeout-minutes: 300
    # Stalest-first cohort with no row locking — never run two of these at once
    # (a second would re-pick the same stalest tools = wasted DeepSeek spend).
    concurrency:
      group: refresh-tool-data-full
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: Deep refresh (Phase 4 SOP, stalest cohort)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          # Optional override via the dispatch input; defaults to 300/day (~7-day cycle).
          COHORT: ${{ github.event.inputs.batch_size }}
        run: |
          if [ -n "$COHORT" ]; then
            npx tsx scripts/backfill-tool-data.ts --apply --cohort="$COHORT"
          else
            npx tsx scripts/backfill-tool-data.ts --apply --cohort=300
          fi
